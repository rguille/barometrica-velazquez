<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --sea:#0B5E8C; --sea-soft:#136D9E; --sea-deep:#083F5E;
    --sky:#EAF6FB; --sky-alt:#DCEEF7;
    --ink:#0B2E42; --ink-soft:#436577;
    --leaf:#6FBE44; --leaf-deep:#4C9A2A; --leaf-soft:#E5F3DA;
    --line:#CDE3EE; --white:#FFFFFF;
    --rust:#C1553A; --rust-soft:#F6DED6;
    --on-dark:#F2FAFD; --on-dark-soft:#CFE9F7;
    --f-display:'Fraunces', serif; --f-body:'Inter', system-ui, sans-serif; --f-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--sky); color:var(--ink); font-family:var(--f-body);}
  button, select, input{font-family:inherit; font-size:inherit;}
  button{cursor:pointer;}
  button:focus-visible, select:focus-visible, input:focus-visible, a:focus-visible{
    outline:2px solid var(--leaf-deep); outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }

  .shell{display:flex; flex-direction:column; flex:1;}
  @media (min-width:768px){ .shell{flex-direction:row;} }

  .sidebar{background:linear-gradient(160deg, var(--sea) 0%, var(--sea-deep) 100%); padding:18px 20px; display:flex; align-items:center; justify-content:space-between;}
  @media (max-width:767px){ .sidebar{justify-content:center;} }
  @media (min-width:768px){ .sidebar{flex-direction:column; align-items:stretch; width:240px; justify-content:flex-start; padding:28px 22px;} }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand svg{color:var(--leaf); flex-shrink:0;}
  .brand-logo-tile{background:#fff; border-radius:10px; padding:6px 10px; box-shadow:0 4px 14px rgba(0,0,0,.12); width:118px; flex-shrink:0;}
  .brand-logo-tile img{display:block; width:100%; height:auto;}
  .brand-details{display:none;}
  .brand-title{font-family:var(--f-display); font-size:22px; font-weight:700; color:#fff; line-height:1.15;}
  .brand-sub{color:var(--leaf); font-size:11.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; margin-top:2px;}
  .brand-subtag{color:var(--on-dark-soft); font-size:11px; margin-top:2px;}
  .brand-slogan{color:var(--on-dark-soft); font-size:10.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; margin-top:8px;}
  .brand-tag{color:var(--on-dark-soft); font-size:12px; line-height:1.5; margin-top:8px; max-width:190px;}
  @media (min-width:768px){
    .brand{flex-direction:column; align-items:stretch;}
    .brand-logo-tile{width:100%; margin-bottom:14px;}
    .brand-details{display:block;}
  }
  .nav{display:flex; gap:6px;}
  @media (max-width:767px){ .nav{display:none;} }
  @media (min-width:768px){ .nav{flex-direction:column; margin-top:36px; gap:5px;} }
  .navbtn{display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:8px; border:none; background:transparent; color:var(--on-dark); font-weight:600; font-size:14px; transition:background-color .15s ease;}
  .navbtn.active{background:rgba(111,190,68,0.18); color:#fff; font-weight:600; box-shadow:inset 3px 0 0 var(--leaf);}
  .navbtn svg{flex-shrink:0;}
  .navbtn span{display:none;}
  @media (min-width:640px){ .navbtn span{display:inline;} }

// Convierte lo que se pega desde geojson.io (FeatureCollection, Feature, o geometría suelta)
// en un arreglo de [lat,lng]. Devuelve null si no encuentra un polígono válido.
function parseGeoJsonPolygon(texto){
  let data;
  try{ data = JSON.parse(texto); }catch(e){ return null; }
  let geometry = null;
  if(data.type === "FeatureCollection"){
    const feat = (data.features || []).find(f => f.geometry && (f.geometry.type === "Polygon" || f.geometry.type === "MultiPolygon"));
    geometry = feat ? feat.geometry : null;
  }else if(data.type === "Feature"){
    geometry = data.geometry;
  }else if(data.type === "Polygon" || data.type === "MultiPolygon"){
    geometry = data;
  }else if(data.coordinates){
    geometry = data;
  }
  if(!geometry || !geometry.coordinates) return null;
  const anillo = geometry.type === "MultiPolygon" ? geometry.coordinates[0][0] : geometry.coordinates[0];
  if(!anillo || anillo.length < 3) return null;
  let puntos = anillo.map(([lng, lat]) => [lat, lng]);
  // El primer y último punto suelen repetirse para cerrar el polígono: sacamos el duplicado.
  const primero = puntos[0], ultimo = puntos[puntos.length - 1];
  if(puntos.length > 3 && primero[0] === ultimo[0] && primero[1] === ultimo[1]) puntos = puntos.slice(0, -1);
  return puntos;
}

function formatAddress(c){
  const parts = [];
  if(c.direccion) parts.push(c.direccion);
  if(c.codigoPostal) parts.push(`CP ${c.codigoPostal}`);
  if(c.localidad) parts.push(c.localidad);
  if(c.departamento) parts.push(c.departamento);
  return parts.length ? parts.join(", ") : "sin dirección registrada";
}
function buildWhatsAppMessage(client, service){
  const mapLine = (client.lat && client.lng)
    ? `\nUbicación: https://www.openstreetmap.org/?mlat=${client.lat}&mlon=${client.lng}#map=16/${client.lat}/${client.lng}`
    : "";
  return `Hola ${client.nombre}, te escribimos de Velázquez Barométrica para coordinar el día y la hora de tu servicio de ${service.nombre.toLowerCase()}. Tenemos registrada tu dirección como: ${formatAddress(client)}.${mapLine}\n¿Qué disponibilidad tenés?`;
}
function buildNewRequestMessage(data, service){

    ? `\nUbicación: https://www.openstreetmap.org/?mlat=${data.lat}&mlon=${data.lng}#map=16/${data.lat}/${data.lng}`
    : "";
  return `Nueva solicitud de contratación:\nServicio: ${service.nombre}\nCliente: ${data.nombre} ${data.apellidos}\nTeléfono: ${data.telefono}\nDirección: ${formatAddress(data)}${mapLine}`;

    window.open(whatsappUrl(BUSINESS.notifyWhatsapp, buildNewRequestMessage(data, service)), "_blank");
  }
}
function whatsappUrl(phone, message){
  return `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
}
function toWhatsAppNumber(phone){
  let n = normPhone(phone);
  if(n.startsWith("0")) n = n.slice(1);
  if(!n.startsWith("598")) n = "598" + n;
  return n;
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function plusOneYear(iso){ const d = new Date(iso); d.setFullYear(d.getFullYear()+1); return d.toISOString(); }
function fmtDate(iso){ return new Date(iso).toLocaleDateString("es-ES", { day:"2-digit", month:"short", year:"numeric" }); }
function daysBetween(a,b){ return Math.round((new Date(b) - new Date(a)) / 86400000); }
function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, (m) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m]));
}
function normPhone(p){ return String(p || "").replace(/[^\d]/g, ""); }

try{
  if(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "TU_API_KEY" && typeof firebase !== "undefined"){
    firebase.initializeApp(FIREBASE_CONFIG);

  }

// Cada "key" (clients, transactions, catalog) se guarda como un documento
// en la colección "appdata", con todo el arreglo adentro del campo "value".
async function loadKey(key, fallback){
  if(!firebaseReady) return fallback;
  try{
    const snap = await db.collection("appdata").doc(key).get();
    if(snap.exists && snap.data().value !== undefined) return snap.data().value;
    return fallback;
  }catch(e){ return fallback; }
}
async function saveKey(key, value){
  if(!firebaseReady) return;
  try{
    await db.collection("appdata").doc(key).set({
      value,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  }catch(e){ /* surfaced elsewhere */ }
}

};

/* ---------------- data ops ---------------- */
async function init(){
  const [clients, transactions, zones] = await Promise.all([
    loadKey("clients", []),
    loadKey("transactions", []),
    loadKey("zones", []),
  ]);
  state.clients = clients;
  state.transactions = transactions;
  state.zones = zones;
  // El catálogo es siempre interno: sale directo del código (DEFAULT_CATALOG),
  // nunca se guarda ni se lee de la base de datos, así no queda desactualizado.
  state.catalog = DEFAULT_CATALOG;
  state.loading = false;
  render();
  handleMercadoPagoReturn();
  hideSplash();
}
function hideSplash(){
  const el = document.getElementById("splash");
  if(!el) return;
  el.classList.add("hide");
  setTimeout(() => el.remove(), 400);
}
function handleMercadoPagoReturn(){
  const params = new URLSearchParams(window.location.search);
  const status = params.get("status") || params.get("collection_status");
  if(!status) return;
  if(status === "approved") showToast("¡Pago recibido! Gracias.");
  else if(status === "pending" || status === "in_process") showToast("Tu pago quedó pendiente de confirmación.");
  else showToast("El pago no se completó. Tu solicitud sigue registrada, podés coordinarlo directamente.");
  // Limpia los parámetros de la URL para que el aviso no reaparezca al refrescar.
  window.history.replaceState({}, "", window.location.origin + window.location.pathname);
}
function showToast(msg){
  state.toast = msg;
  const existing = document.querySelector(".toast");
  if(existing) existing.remove();
  document.body.insertAdjacentHTML("beforeend", renderToast());
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { const t = document.querySelector(".toast"); if(t) t.remove(); }, 2800);
}
function findClientByPhone(phone){
  const n = normPhone(phone);
  if(!n) return null;
  return state.clients.find(c => normPhone(c.telefono) === n) || null;
}
async function confirmContract(serviceId, data, payment){
  const service = state.catalog.find(s => s.id === serviceId);
  if(!service) return;
  let client = findClientByPhone(data.telefono);
  if(client){
    client = { ...client, ...data };
    state.clients = state.clients.map(c => c.id === client.id ? client : c);
  }else{
    client = { id: uid(), ...data, createdAt: new Date().toISOString() };
    state.clients = [client, ...state.clients];
  }
  await saveKey("clients", state.clients);

  const date = new Date().toISOString();
  const pagoEstado = !payment ? "sin pago" : (payment.remaining === 0 ? "pagado" : "pendiente_mp");
  // Queda "pendiente" y sin puntos: los puntos se suman a mano desde el Panel
  // interno recién cuando el servicio se realizó de verdad. El pago (si lo hay)
  // es independiente de eso.
  const txn = {
    id: uid(), clientId: client.id, serviceId: service.id, serviceName: service.nombre,
    puntosServicio: service.puntos, puntos: 0, status: "pendiente",
    date, completedAt: null, expiresAt: null,
    precio: payment ? payment.price : null,
    pagoMonto: payment ? payment.remaining : 0,
    pagoPuntos: payment ? payment.pointsToUse : 0,
    pagoEstado,
  };
  state.transactions = [txn, ...state.transactions];

  if(payment && payment.pointsToUse > 0){
    const redeemTxn = {
      id: uid(), clientId: client.id, serviceId: service.id, serviceName: `${service.nombre} (pago con puntos)`,
      puntos: -payment.pointsToUse, type: "redeem", date, expiresAt: "9999-12-31T00:00:00.000Z",
    };
    state.transactions = [redeemTxn, ...state.transactions];
  }
  await saveKey("transactions", state.transactions);

  state.pendingMarker = null;
  state.puntosPhone = client.telefono;
  state.puntosClientId = client.id;
  state.puntosSearched = true;

  if(payment && payment.remaining > 0){
    const ok = await redirectToMercadoPago(client, service, payment.remaining, txn.id);
    if(ok) return; // la pestaña está navegando a Mercado Pago, no hace falta más
    showToast("No se pudo iniciar el pago online. Tu solicitud quedó registrada sin pagar.");
  }

  state.contractModal = { serviceId, matchedClientId: client.id, confirmed: { client, service, payment } };
  render();
}
async function redirectToMercadoPago(client, service, monto, referenciaId){
  if(!BUSINESS.mercadoPagoEndpoint) return false;
  try{
    const res = await fetch(BUSINESS.mercadoPagoEndpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        titulo: `${service.nombre} — Velázquez Barométrica`,
        monto,
        referencia: referenciaId,
        cliente: { nombre: client.nombre, apellidos: client.apellidos, telefono: client.telefono },
      }),
    });
    const result = await res.json();
    if(!res.ok || !result.init_point) return false;
    window.location.href = result.init_point;
    return true;
  }catch(e){
    return false;
  }
}
async function markServiceCompleted(txnId){
  const txn = state.transactions.find(t => t.id === txnId);
  if(!txn) return;
  const client = state.clients.find(c => c.id === txn.clientId);
  const now = new Date().toISOString();
  const updated = { ...txn, status: "completado", puntos: txn.puntosServicio, completedAt: now, expiresAt: plusOneYear(now) };
  state.transactions = state.transactions.map(t => t.id === txnId ? updated : t);
  await saveKey("transactions", state.transactions);
  showToast(`Servicio confirmado: +${updated.puntos} pts para ${client ? client.nombre : "el cliente"}`);
  render();
}
async function purgeExpired(){
  const now = new Date().toISOString();
  const before = state.transactions.length;
  state.transactions = state.transactions.filter(t => t.status === "pendiente" || t.expiresAt > now);
  const removed = before - state.transactions.length;
  await saveKey("transactions", state.transactions);
  showToast(removed > 0 ? `${removed} punto(s) caducado(s) eliminado(s)` : "No había puntos caducados");
  render();
}
function activePointsFor(clientId){
  const now = new Date().toISOString();
  return state.transactions.filter(t => t.clientId === clientId && t.expiresAt > now).reduce((s,t) => s + t.puntos, 0);
}
function eligibleRewards(clientId){
  const points = activePointsFor(clientId);
  return state.catalog
    .map(s => ({ service: s, goal: s.puntos * REWARD_MULTIPLIER }))
    .filter(r => points >= r.goal);
}
async function redeemReward(clientId, serviceId){
  const service = state.catalog.find(s => s.id === serviceId);
  const client = state.clients.find(c => c.id === clientId);
  if(!service || !client) return;
  const goal = service.puntos * REWARD_MULTIPLIER;
  if(activePointsFor(clientId) < goal){ showToast("Ese cliente ya no tiene puntos suficientes"); return; }
  const date = new Date().toISOString();
  const txn = {
    id: uid(), clientId, serviceId: service.id, serviceName: service.nombre,
    puntos: -goal, type: "redeem", date, expiresAt: "9999-12-31T00:00:00.000Z",
  };
  state.transactions = [txn, ...state.transactions];
  await saveKey("transactions", state.transactions);
  state.redeemModal = null;
  showToast(`Premio canjeado: ${service.nombre} para ${client.nombre}`);
  render();
}

function computePaymentInfo(departamento){
  const service = state.catalog.find(s => s.id === state.contractModal.serviceId);
  const clientId = state.contractModal.matchedClientId;
  const coords = state.pendingMarker || (clientId ? (() => {
    const c = state.clients.find(cl => cl.id === clientId);
    return (c && c.lat && c.lng) ? { lat: c.lat, lng: c.lng } : null;
  })() : null);
  const zona = coords ? zonaParaCoordenadas(coords.lat, coords.lng) : null;
  let price = null;
  if(zona && zona.precios && zona.precios[service.id] != null){
    price = zona.precios[service.id];
  }else{
    price = priceFor(service, departamento);
  }
  const availablePoints = clientId ? activePointsFor(clientId) : 0;
  return { service, price, availablePoints, zona, tieneCoords: !!coords };
}
function renderPaymentSection(departamento){
  const { price, availablePoints, zona, tieneCoords } = computePaymentInfo(departamento);
  const pm = state.contractModal;
  if(price == null){
    return `
      <div class="payment-box">
        <span class="payment-title">${ICONS.card} Pago</span>
        <p class="payment-note" style="margin-top:6px; margin-bottom:0;">
          ${tieneCoords
            ? `Todavía no tenemos un precio cargado para esa zona ni para ${escapeHtml(departamento)}. Podés continuar igual — coordinamos el precio cuando te contactemos.`
            : `Marcá tu ubicación en el mapa de abajo para ver el precio de tu zona, o continuá igual — coordinamos el precio cuando te contactemos.`}
        </p>
      </div>
    `;
  }
  const canUsePoints = availablePoints > 0;
  const maxPointsUsable = Math.min(availablePoints, Math.ceil(price / POINTS_VALUE_UYU));
  const pointsToUse = pm.payMethod === "dinero" ? 0 : Math.min(pm.pointsToUse || 0, maxPointsUsable);
  const discount = pointsToUse * POINTS_VALUE_UYU;
  const remaining = Math.max(0, price - discount);

  return `
    <div class="payment-box">
      <div class="payment-head">
        <span class="payment-title">${ICONS.card} Pago (opcional)</span>
        <span class="payment-price">$${price.toLocaleString("es-UY")}</span>
      </div>
      ${zona
        ? `<p class="payment-note" style="margin-bottom:6px;">Precio para la zona <strong>${escapeHtml(zona.nombre)}</strong>, según tu ubicación en el mapa.</p>`
        : `<p class="payment-note">Podés pagar ahora o dejarlo pendiente y coordinarlo cuando te contactemos.</p>`}
      <div class="pay-toggle-row">
        <button type="button" class="pay-toggle-btn ${!pm.payNow ? "active" : ""}" data-paynow="0">Pagar después</button>
        <button type="button" class="pay-toggle-btn ${pm.payNow ? "active" : ""}" data-paynow="1">Pagar ahora</button>
      </div>
      ${pm.payNow ? `
        <div class="pay-method-grid">
          <button type="button" class="pay-method-btn ${pm.payMethod==="dinero"?"active":""}" data-method="dinero">Solo dinero</button>
          <button type="button" class="pay-method-btn ${pm.payMethod==="mixto"?"active":""}" data-method="mixto" ${!canUsePoints?"disabled":""}>Dinero + puntos</button>
          <button type="button" class="pay-method-btn ${pm.payMethod==="puntos"?"active":""}" data-method="puntos" ${(!canUsePoints || maxPointsUsable*POINTS_VALUE_UYU < price)?"disabled":""}>Solo puntos</button>
        </div>
        ${pm.payMethod !== "dinero" ? `
          <div class="points-slider-row">
            <input type="range" id="points-range" min="0" max="${maxPointsUsable}" value="${pointsToUse}" />
            <span style="font-family:var(--f-mono); font-size:12px; white-space:nowrap;">${pointsToUse} pts</span>
          </div>
        ` : ""}
        <div class="pay-summary">
          <span>Precio del servicio: <strong>$${price.toLocaleString("es-UY")}</strong></span>
          ${discount > 0 ? `<span>Descuento por puntos: <strong>-$${discount.toLocaleString("es-UY")}</strong></span>` : ""}
          <span>Total a pagar ahora: <strong>${remaining === 0 ? "Cubierto con puntos" : "$" + remaining.toLocaleString("es-UY")}</strong></span>
          ${canUsePoints ? `<span style="font-size:11px;">Tenés ${availablePoints} pts disponibles (1 pt = $${POINTS_VALUE_UYU}).</span>` : ""}
        </div>
        ${remaining > 0
          ? (BUSINESS.mercadoPagoEndpoint
              ? `<button type="button" class="btn-mp" id="pay-mp-btn">${ICONS.card} Pagar $${remaining.toLocaleString("es-UY")} con Mercado Pago</button>`
              : `<p class="payment-note" style="margin-bottom:0;">El pago online todavía no está conectado — dejá "Pagar después" por ahora.</p>`)
          : `<button type="button" class="btn-primary" id="pay-points-btn" style="width:100%; margin-top:0;">${ICONS.check} Confirmar y pagar con puntos</button>`
        }
      ` : ""}
    </div>
  `;
}

function gatherContractFormData(){
  const requiredFields = {
    telefono: document.getElementById("input-telefono"),
    nombreCompleto: document.getElementById("input-nombreCompleto"),
    direccion: document.getElementById("input-direccion"),
    localidad: document.getElementById("input-localidad"),
    departamento: document.getElementById("input-departamento"),
  };
  const codigoPostalInput = document.getElementById("input-codigoPostal");
  let valid = true;
  Object.entries(requiredFields).forEach(([key, el]) => {
    const wrap = document.getElementById(`field-${key}`);
    if(!el.value.trim()){
      valid = false;
      wrap.classList.add("invalid");
      wrap.querySelector(".error-text").classList.add("show");
    }else{
      wrap.classList.remove("invalid");
      wrap.querySelector(".error-text").classList.remove("show");
    }
  });
  if(!valid) return { valid: false };
  const nombreCompleto = requiredFields.nombreCompleto.value.trim().replace(/\s+/g, " ");
  const [primerNombre, ...resto] = nombreCompleto.split(" ");
  const data = {
    nombre: primerNombre,
    apellidos: resto.join(" "),
    nombreCompleto,
    telefono: requiredFields.telefono.value.trim(),
    direccion: requiredFields.direccion.value.trim(),
    codigoPostal: codigoPostalInput.value.trim(),
    localidad: requiredFields.localidad.value.trim(),
    departamento: requiredFields.departamento.value,
    lat: state.pendingMarker ? state.pendingMarker.lat : (state.clients.find(c=>c.id===state.contractModal.matchedClientId)?.lat ?? null),
    lng: state.pendingMarker ? state.pendingMarker.lng : (state.clients.find(c=>c.id===state.contractModal.matchedClientId)?.lng ?? null),
  };
  return { valid: true, data };
}
function submitContractForm(options){
  const { valid, data } = gatherContractFormData();
  if(!valid) return;
  const service = state.catalog.find(s => s.id === state.contractModal.serviceId);
  if(!service) return;

  let payment = null;
  if(state.contractModal.payNow){
    const { price, availablePoints } = computePaymentInfo(data.departamento);
    if(price != null){
      const pointsToUse = state.contractModal.payMethod === "dinero" ? 0 : Math.min(state.contractModal.pointsToUse || 0, availablePoints, Math.ceil(price / POINTS_VALUE_UYU));
      const discount = pointsToUse * POINTS_VALUE_UYU;
      const remaining = Math.max(0, price - discount);
      payment = { price, pointsToUse, remaining };
    }
  }

  // Si hay API de WhatsApp Business conectada, esto se manda solo, en silencio.
  // Si no, abre wa.me en el mismo toque (antes de los awaits) para que el
  // navegador no lo bloquee como ventana emergente.
  notifyNewRequest(data, service);
  confirmContract(state.contractModal.serviceId, data, payment);
}

  state.contractModal = null;

async function fillAddressFromCoords(lat, lng){
  const coordsEl = document.getElementById("coords-display");
  if(coordsEl) coordsEl.textContent = `Ubicación seleccionada: ${lat.toFixed(5)}, ${lng.toFixed(5)} — buscando la dirección…`;
  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&addressdetails=1`);
    const data = await res.json();
    const a = data.address || {};
    const calle = [a.road, a.house_number].filter(Boolean).join(" ");
    const localidad = a.city || a.town || a.village || a.suburb || a.county || "";
    const codigoPostal = a.postcode || "";
    const departamentoRaw = a.state || "";
    const direccionInput = document.getElementById("input-direccion");
    const localidadInput = document.getElementById("input-localidad");
    const codigoPostalInput = document.getElementById("input-codigoPostal");
    const departamentoSelect = document.getElementById("input-departamento");
    // Solo pisa el texto si el campo estaba vacío o si la persona no lo tocó a mano;
    // así no se sobreescribe algo que ya escribieron ellos mismos con intención.
    if(direccionInput && calle) direccionInput.value = calle;
    if(localidadInput && localidad) localidadInput.value = localidad;
    if(codigoPostalInput && codigoPostal) codigoPostalInput.value = codigoPostal;
    if(departamentoSelect && departamentoRaw){
      const match = UY_DEPARTAMENTOS.find(d => departamentoRaw.toLowerCase().includes(d.toLowerCase()));
      if(match) departamentoSelect.value = match;
    }
  }catch(e){
    // Si falla la búsqueda de dirección, no pasa nada: queda el pin igual,
    // la persona puede escribir la dirección a mano.
  }
  if(coordsEl) coordsEl.textContent = `Ubicación seleccionada: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}
async function searchAddressOnMap(){
  const direccion = document.getElementById("input-direccion").value.trim();
  const localidad = document.getElementById("input-localidad").value.trim();
  const departamento = document.getElementById("input-departamento").value;
  if(!direccion){ showToast("Escribí primero la dirección para poder buscarla"); return; }
  const query = [direccion, localidad, departamento, "Uruguay"].filter(Boolean).join(", ");
  const btn = document.getElementById("search-address-btn");
  const originalLabel = btn.innerHTML;
  btn.innerHTML = "Buscando…";
  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${encodeURIComponent(query)}`);
    const results = await res.json();
    if(!results || results.length === 0){
      showToast("No encontramos esa dirección en el mapa. Marcá el pin a mano.");
      return;
    }
    const { lat, lon } = results[0];
    const ll = { lat: parseFloat(lat), lng: parseFloat(lon) };
    state.pendingMarker = ll;
    if(leafletMap){
      leafletMap.setView([ll.lat, ll.lng], 16);
      if(leafletMarker) leafletMarker.setLatLng(ll);
      else leafletMarker = L.marker(ll).addTo(leafletMap);
    }
    document.getElementById("clear-marker-btn").style.display = "inline-flex";
    document.getElementById("coords-display").textContent = `Ubicación seleccionada: ${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)}`;
    updatePaymentSection();
  }catch(e){
    showToast("No se pudo buscar la dirección. Probá marcar el pin a mano.");
  }finally{
    btn.innerHTML = originalLabel;
  }
}
function initModalMap(){
  const el = document.getElementById("map-picker");
  if(!el || typeof L === "undefined") return;
  const start = state.pendingMarker ? [state.pendingMarker.lat, state.pendingMarker.lng] : DEFAULT_CENTER;
  const zoom = state.pendingMarker ? 14 : DEFAULT_ZOOM;
  leafletMap = L.map("map-picker", { scrollWheelZoom:false }).setView(start, zoom);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(leafletMap);
  if(state.pendingMarker){
    leafletMarker = L.marker(start).addTo(leafletMap);
    document.getElementById("clear-marker-btn").style.display = "inline-flex";
    document.getElementById("coords-display").textContent = `Ubicación seleccionada: ${state.pendingMarker.lat.toFixed(5)}, ${state.pendingMarker.lng.toFixed(5)}`;
  }
  leafletMap.on("click", (e) => {
    state.pendingMarker = { lat: e.latlng.lat, lng: e.latlng.lng };
    if(leafletMarker) leafletMarker.setLatLng(e.latlng);
    else leafletMarker = L.marker(e.latlng).addTo(leafletMap);
    document.getElementById("clear-marker-btn").style.display = "inline-flex";
    fillAddressFromCoords(e.latlng.lat, e.latlng.lng);
    updatePaymentSection();
  });
  setTimeout(() => leafletMap.invalidateSize(), 120);

  document.getElementById("locate-btn").addEventListener("click", () => {
    if(!navigator.geolocation){ showToast("Este navegador no admite geolocalización"); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const ll = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        state.pendingMarker = ll;
        leafletMap.setView([ll.lat, ll.lng], 15);
        if(leafletMarker) leafletMarker.setLatLng(ll);
        else leafletMarker = L.marker(ll).addTo(leafletMap);
        document.getElementById("clear-marker-btn").style.display = "inline-flex";
        fillAddressFromCoords(ll.lat, ll.lng);
        updatePaymentSection();
      },
      () => showToast("No se pudo obtener tu ubicación")
    );
  });
  document.getElementById("clear-marker-btn").addEventListener("click", () => {
    state.pendingMarker = null;
    if(leafletMarker){ leafletMap.removeLayer(leafletMarker); leafletMarker = null; }
    document.getElementById("coords-display").textContent = "Toca el mapa para marcar la ubicación.";
    document.getElementById("clear-marker-btn").style.display = "none";
    updatePaymentSection();
  });
}

function initZonesMap(){
  const el = document.getElementById("zones-map");
  if(!el || typeof L === "undefined") return;
  zonesMap = L.map("zones-map", { scrollWheelZoom:false }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(zonesMap);
  zonesMapLayers = [];

  // Zonas ya guardadas, dibujadas como referencia (no editables).
  state.zones.forEach((z, i) => {
    if(!z.puntos || z.puntos.length < 3) return;
    const poly = L.polygon(z.puntos, { color: z.color || ZONE_COLORS[i % ZONE_COLORS.length], weight: 2, fillOpacity: .15 })
      .addTo(zonesMap).bindTooltip(z.nombre);
    zonesMapLayers.push(poly);
  });

  const drawing = state.zoneDrawing;
  if(drawing){
    // Dibuja el polígono que se está armando (o el ya finalizado, en modo formulario).
    let tempLayer = drawing.puntos.length >= 2
      ? (drawing.finalizing
          ? L.polygon(drawing.puntos, { color: "#0B5E8C", weight: 2, dashArray: drawing.finalizing ? null : "4", fillOpacity: .12 }).addTo(zonesMap)
          : L.polyline(drawing.puntos, { color: "#0B5E8C", weight: 2, dashArray: "4" }).addTo(zonesMap))
      : null;
    drawing.puntos.forEach(p => L.circleMarker(p, { radius: 4, color: "#0B5E8C", fillColor: "#0B5E8C", fillOpacity: 1 }).addTo(zonesMap));
    if(drawing.puntos.length) zonesMap.setView(drawing.puntos[drawing.puntos.length - 1], 13);

    if(!drawing.finalizing){
      zonesMap.on("click", (e) => {
        drawing.puntos.push([e.latlng.lat, e.latlng.lng]);
        L.circleMarker(e.latlng, { radius: 4, color: "#0B5E8C", fillColor: "#0B5E8C", fillOpacity: 1 }).addTo(zonesMap);
        if(tempLayer) zonesMap.removeLayer(tempLayer);
        if(drawing.puntos.length >= 2){
          tempLayer = L.polyline(drawing.puntos, { color: "#0B5E8C", weight: 2, dashArray: "4" }).addTo(zonesMap);
        }
        const countEl = document.getElementById("zone-point-count");
        if(countEl) countEl.textContent = `Puntos marcados: ${drawing.puntos.length}`;
        const finishBtn = document.getElementById("zone-draw-finish");
        if(finishBtn){
          finishBtn.disabled = drawing.puntos.length < 3;
          finishBtn.style.opacity = drawing.puntos.length < 3 ? ".5" : "1";
        }
      });
    }
  }
  setTimeout(() => zonesMap.invalidateSize(), 120);
}
function attachZonesListeners(){
  const startBtn = document.getElementById("zone-draw-start");
  if(startBtn){
    startBtn.addEventListener("click", () => {
      state.zoneDrawing = { puntos: [], finalizing: false };

  }
  const finishBtn = document.getElementById("zone-draw-finish");
  if(finishBtn){
    finishBtn.addEventListener("click", () => {
      if(state.zoneDrawing.puntos.length < 3) return;
      state.zoneDrawing.finalizing = true;
      render();
    });
  }
  const formCancelBtn = document.getElementById("zone-form-cancel");
  if(formCancelBtn){
    formCancelBtn.addEventListener("click", () => { state.zoneDrawing = null; render(); });
  }
  const zoneForm = document.getElementById("zone-form");
  if(zoneForm){
    zoneForm.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const nombre = document.getElementById("zone-name-input").value.trim();
      if(!nombre){ showToast("Ponele un nombre a la zona"); return; }
      const precios = {};
      document.querySelectorAll("[data-zone-price]").forEach(input => {
        const val = parseFloat(input.value);
        if(!isNaN(val) && val >= 0) precios[input.dataset.zonePrice] = val;
      });
      const zone = {
        id: uid(),
        nombre,
        color: ZONE_COLORS[state.zones.length % ZONE_COLORS.length],
        puntos: state.zoneDrawing.puntos,
        precios,
      };
      state.zones = [...state.zones, zone];
      await saveKey("zones", state.zones);
      state.zoneDrawing = null;
      showToast("Zona guardada");
      render();
    });
  }
  document.querySelectorAll("[data-zone-delete]").forEach(btn => {
    btn.addEventListener("click", async () => {
      if(!confirm("¿Eliminar esta zona?")) return;
      state.zones = state.zones.filter(z => z.id !== btn.dataset.zoneDelete);
      await saveKey("zones", state.zones);
      render();
    });
  });
}

/* ---------------- MIS PUNTOS ---------------- */
function renderPuntosView(){
  return `
    ${sectionHeader("Tu cuenta", "Mis puntos", "Introduce el teléfono con el que contrataste el servicio para consultar tu saldo.")}
    <div class="card" style="margin-bottom:24px;">
      <div class="search-row">
        <label class="field" style="margin:0; flex:1; min-width:200px;"><span class="label-text">Teléfono</span>
          <input class="input" id="puntos-phone" value="${escapeHtml(state.puntosPhone)}" placeholder="Ej. 095 143 777" />
        </label>
        <button class="btn-primary" id="puntos-search-btn" style="width:auto; padding:10px 18px;">${ICONS.search} Ver mis puntos</button>
      </div>
    </div>
    ${renderPuntosResult()}
  `;
}
function renderPuntosResult(){
  if(!state.puntosSearched) return "";
  const client = state.puntosClientId ? state.clients.find(c => c.id === state.puntosClientId) : null;
  if(!client){
    return emptyState("No encontramos ningún registro con ese teléfono. Contrata un servicio para empezar a acumular puntos.");
  }
  return renderPuntosDetail(client);
}
function renderPuntosDetail(selected){
  const now = new Date();
  const nowIso = now.toISOString();
  const clientTxns = state.transactions.filter(t => t.clientId === selected.id).sort((a,b) => new Date(b.date) - new Date(a.date));
  const points = activePointsFor(selected.id);
  const milestone = 500;
  const progress = points % milestone;
  const pct = (progress / milestone) * 100;
  const radius = 58;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (pct / 100) * circumference;

  const buckets = Array.from({ length: 12 }, (_, i) => {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    return { label: MESES[d.getMonth()], year: d.getFullYear(), puntos: 0 };
  });
  clientTxns.forEach(t => {
    if(t.type === "redeem") return;
    if(t.expiresAt <= nowIso) return;
    const exp = new Date(t.expiresAt);
    let idx = (exp.getFullYear() - now.getFullYear()) * 12 + (exp.getMonth() - now.getMonth());
    idx = Math.max(0, Math.min(11, idx));
    buckets[idx].puntos += t.puntos;
  });
  const maxBucket = Math.max(1, ...buckets.map(b => b.puntos));
  const rewards = eligibleRewards(selected.id);

  return `
    <div class="client-header">
      <div>
        <div class="client-header-name">${ICONS.user} ${escapeHtml(selected.nombre)} ${escapeHtml(selected.apellidos)}</div>
        <div class="client-header-meta">${escapeHtml(formatAddress(selected))}</div>
      </div>
      <button class="btn-ghost" id="puntos-reset" style="text-decoration:underline;">Buscar otro teléfono</button>
    </div>

    ${rewards.length > 0 ? `
      <div class="match-banner" style="margin-bottom:20px;">
        ${ICONS.gift} ¡Ya puedes canjear ${rewards.length > 1 ? "estos servicios gratis" : "este servicio gratis"}!
        ${rewards.map(r => escapeHtml(r.service.nombre)).join(", ")}. Contáctanos para agendarlo.
      </div>
    ` : ""}

    <div class="grid grid-2" style="margin-bottom:36px;">
      <div class="card dial-card">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="${radius}" fill="none" stroke="var(--sky-alt)" stroke-width="10" />
          <circle cx="70" cy="70" r="${radius}" fill="none" stroke="var(--leaf)" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" transform="rotate(-90 70 70)" />
          <text x="70" y="66" text-anchor="middle" style="font-family:var(--f-display); font-size:26px; font-weight:700; fill:var(--sea-deep);">${points}</text>
          <text x="70" y="84" text-anchor="middle" style="font-family:var(--f-mono); font-size:10px; fill:var(--ink-soft);">PUNTOS</text>
        </svg>
        <p class="dial-caption">Faltan <strong style="color:var(--ink);">${milestone - progress}</strong> pts para la próxima recompensa de ${milestone}</p>
      </div>

      <div class="card">
        <div class="ring-header">
          <div class="ring-title">${ICONS.clock}<span>Vigencia — próximos 12 meses</span></div>
          <button class="btn-ghost" id="purge-btn" style="text-decoration:underline; font-size:11.5px;">Eliminar puntos caducados</button>
        </div>
        <div class="ring-bars">
          ${buckets.map((b,i) => `
            <div class="ring-bar-wrap" title="${b.puntos} pts caducan en ${b.label} ${b.year}">
              <div class="ring-bar" style="height:${Math.max(3, (b.puntos / maxBucket) * 62)}px; background:${i < 1 ? "var(--rust)" : "var(--sea)"};"></div>
              <span class="ring-label">${b.label}</span>
            </div>
          `).join("")}
        </div>
        <p class="ring-note">Cada barra muestra los puntos que caducan ese mes, 12 meses después de haberse ganado.</p>
      </div>
    </div>

    <div>
      <h2 style="font-family:var(--f-display); font-size:18px; font-weight:700; color:var(--sea-deep); margin-bottom:12px;">Historial de servicios</h2>
      ${clientTxns.length === 0 ? emptyState("Aún no hay servicios contratados en este registro.") : `
        <div class="table-wrap">
          <table class="txn-table">
            <thead><tr><th>Servicio</th><th>Fecha</th><th>Puntos</th><th>Caduca</th><th>Estado</th></tr></thead>
            <tbody>
              ${clientTxns.map(t => {
                if(t.type === "redeem"){
                  return `
                    <tr>
                      <td>${escapeHtml(t.serviceName)} <span style="color:var(--ink-soft); font-size:11.5px;">(canje)</span></td>
                      <td style="font-family:var(--f-mono); font-size:12.5px;">${fmtDate(t.date)}</td>
                      <td style="font-family:var(--f-mono); font-size:12.5px; color:var(--rust);">${t.puntos}</td>
                      <td style="font-family:var(--f-mono); font-size:12.5px;">—</td>
                      <td><span class="badge" style="background:var(--sky-alt); color:var(--sea-deep);">Canjeado</span></td>
                    </tr>
                  `;
                }
                if(t.status === "pendiente"){
                  return `
                    <tr>
                      <td>${escapeHtml(t.serviceName)}</td>
                      <td style="font-family:var(--f-mono); font-size:12.5px;">${fmtDate(t.date)}</td>
                      <td style="font-family:var(--f-mono); font-size:12.5px; color:var(--ink-soft);">+${t.puntosServicio} al confirmar</td>
                      <td style="font-family:var(--f-mono); font-size:12.5px;">—</td>
                      <td><span class="badge" style="background:var(--rust-soft); color:var(--rust);">Pendiente</span></td>
                    </tr>
                  `;
                }
                const expired = t.expiresAt <= nowIso;
                const soon = !expired && daysBetween(nowIso, t.expiresAt) <= 30;
                const badge = expired ? '<span class="badge badge-expired">Caducado</span>' : soon ? '<span class="badge badge-soon">Caduca pronto</span>' : '<span class="badge badge-active">Activo</span>';
                return `
                  <tr style="${expired ? "opacity:.5;" : ""}">
                    <td>${escapeHtml(t.serviceName)}</td>
                    <td style="font-family:var(--f-mono); font-size:12.5px;">${fmtDate(t.date)}</td>
                    <td style="font-family:var(--f-mono); font-size:12.5px;">+${t.puntos}</td>
                    <td style="font-family:var(--f-mono); font-size:12.5px;">${fmtDate(t.expiresAt)}</td>
                    <td>${badge}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `}
    </div>
  `;
}
function attachPuntosListeners(){
  document.getElementById("puntos-search-btn").addEventListener("click", () => {
    const phone = document.getElementById("puntos-phone").value;
    state.puntosPhone = phone;
    const client = findClientByPhone(phone);
    state.puntosClientId = client ? client.id : null;
    state.puntosSearched = true;
    render();
  });
  const resetBtn = document.getElementById("puntos-reset");
  if(resetBtn) resetBtn.addEventListener("click", () => {
    state.puntosPhone = ""; state.puntosClientId = null; state.puntosSearched = false; render();
  });
  const purgeBtn = document.getElementById("purge-btn");
  if(purgeBtn) purgeBtn.addEventListener("click", purgeExpired);
}

/* ---------------- boot ---------------- */
init();
</script>
</body>
</html>
